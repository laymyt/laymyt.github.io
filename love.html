<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Love</title>
    <style>
        /* 动态渐变温馨背景 */
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); overflow: hidden; }
        /* 信纸效果的卡片 */
        .love-card { background: rgba(255, 255, 255, 0.9); padding: 50px; border-radius: 15px; box-shadow: 0 10px 30px rgba(255, 105, 135, 0.3); max-width: 500px; text-align: center; line-height: 2; position: relative; }
        h1 { color: #d63031; font-size: 2em; margin-bottom: 20px; font-weight: normal; }
        p { color: #555; font-size: 1.2em; text-align: left; text-indent: 2em; margin-bottom: 15px; }
        .signature { text-align: right; margin-top: 40px; font-weight: bold; color: #d63031; font-size: 1.2em; }
        /* 返回按钮 */
        .back-btn { display: inline-block; margin-top: 30px; font-size: 0.9em; color: #888; text-decoration: none; border-bottom: 1px dashed #888; padding-bottom: 2px; }
        .back-btn:hover { color: #d63031; border-bottom-color: #d63031; }
    </style>
</head>
<body>

    <div class="love-card">
        <h1>亲爱的冒颖婷：</h1>
        <p>如果说代码的运行需要严谨的逻辑，那么我生活里最美妙的变量就是你。在日复一日的实验、数据和报错中，你是我最安心的避风港。</p>
        <p>我想把这个只属于我们的小小网页藏在我的项目里，就像把你永远藏在我心里最重要的位置。无论未来我们在哪里，我的世界永远对你设定为 100% 响应。</p>
        <div class="signature">爱你的，刘奥运</div>
        
        <a href="index.html" class="back-btn">返回项目页</a>
    </div>

</body>
</html>
